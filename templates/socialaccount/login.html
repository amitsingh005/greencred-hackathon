{% load socialaccount %}
<!DOCTYPE html>
<html>
<head>
  <title>Google Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#F9FAF4] flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-2xl shadow-xl text-center w-full max-w-md">

  <h2 class="text-2xl font-bold text-[#1A4731] mb-4">
    Continue with Google 🚀
  </h2>

  <p class="text-gray-500 mb-6">
    You are about to sign in using Google
  </p>

  <form method="post">
    {% csrf_token %}
    <button type="submit"
      class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 transition">
      Continue
    </button>
  </form>

</div>

</body>
</html>
