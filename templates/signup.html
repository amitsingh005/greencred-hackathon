{% extends "base.html" %}

{% block content %}

<div class="flex items-center justify-center min-h-[80vh]">

    <div class="w-full max-w-md bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl p-8 shadow-xl">

        <h2 class="text-3xl font-bold text-center mb-6">Create Account</h2>

        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Username"
                class="w-full p-3 rounded-lg bg-black/30 border border-white/10">

            <input type="password" name="password" placeholder="Password"
                class="w-full p-3 rounded-lg bg-black/30 border border-white/10">

            <button type="submit"
                class="w-full bg-green-500 hover:bg-green-600 py-3 rounded-lg font-semibold transition">
                Sign Up
            </button>
        </form>

        <p class="text-center mt-6 text-gray-400">
            Already have an account?
            <a href="/login/" class="text-green-400 hover:underline">Login</a>
        </p>

    </div>

</div>

{% endblock %}
