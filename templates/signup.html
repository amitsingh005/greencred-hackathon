{% extends 'base.html' %}

{% block content %}

<form method="POST" class="max-w-md mx-auto mt-20">
    {% csrf_token %}

    <h2 class="text-2xl mb-4">Signup</h2>

    <input type="text" name="username" placeholder="Username" class="w-full p-2 mb-3 text-black">
    <input type="password" name="password" placeholder="Password" class="w-full p-2 mb-3 text-black">

    <button class="bg-green-500 px-4 py-2">Signup</button>

</form>

{% endblock %}
