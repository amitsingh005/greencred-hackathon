<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenCred</title>

    <!-- ✅ Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-[#F9FAF4] text-[#1E1E1E]">

    <!-- 🌿 NAVBAR -->
    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur border-b border-gray-200">

        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

            <h1 class="text-xl font-bold text-[#1A4731]">🌱 GreenCred</h1>

            <div class="hidden md:flex space-x-8 text-gray-600">
                <a href="/" class="hover:text-[#4CAF50]">Home</a>
                <a href="/dashboard/" class="hover:text-[#4CAF50]">Dashboard</a>
                <a href="/actions/" class="hover:text-[#4CAF50]">Actions</a>
                <a href="/leaderboard/" class="hover:text-[#4CAF50]">Leaderboard</a>
            </div>

            <a href="/signup/" class="bg-[#4CAF50] text-white px-5 py-2 rounded-lg hover:bg-green-600">
                Get Started
            </a>

        </div>
    </nav>

    <!-- MAIN -->
    <main class="max-w-7xl mx-auto px-6">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
