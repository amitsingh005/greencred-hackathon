<!DOCTYPE html>
<html lang="en">
<head>
    <title>GreenCred 🌱</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            color: white;
        }

        .navbar {
            position: fixed;
            width: 100%;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.6);
            z-index: 10;
        }

        .navbar a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        .content {
            position: relative;
            z-index: 2;
            padding-top: 100px;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="navbar">
    <h2>🌱 GreenCred</h2>

    <div>
        <a href="/">Home</a>
        <a href="/login/">Login</a>
        <a href="/signup/">Signup</a>
    </div>
</div>

<div class="content">
    {% block content %}{% endblock %}
</div>

</body>
</html>
