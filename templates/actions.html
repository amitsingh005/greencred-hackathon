{% extends 'base.html' %}

{% block content %}

<div class="py-10">

    <!-- HEADER -->
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-[#1A4731]">
            📸 Capture Eco Action
        </h1>
        <p class="text-gray-500">
            Take a photo of your eco-friendly action and earn credits
        </p>
    </div>

    <!-- CAMERA CARD -->
    <div class="bg-white p-6 rounded-2xl shadow-md border max-w-3xl mx-auto">

        <!-- VIDEO PREVIEW -->
        <div class="relative rounded-xl overflow-hidden mb-6">
            <video id="video" autoplay class="w-full rounded-xl"></video>
        </div>

        <!-- BUTTONS -->
        <div class="flex justify-center gap-4">

            <button onclick="startCamera()"
                class="bg-gray-800 text-white px-6 py-2 rounded-lg hover:bg-black">
                Open Camera
            </button>

            <button onclick="captureImage()"
                class="bg-[#4CAF50] text-white px-6 py-2 rounded-lg hover:bg-green-600">
                Capture
            </button>

        </div>

        <!-- HIDDEN CANVAS -->
        <canvas id="canvas" class="hidden"></canvas>

        <!-- PREVIEW -->
        <div id="preview" class="mt-6 text-center"></div>

        <!-- FORM -->
        <form method="POST" enctype="multipart/form-data" class="mt-6 text-center">
            {% csrf_token %}

            <input type="hidden" name="image_data" id="image_data">

            <button type="submit"
                class="bg-blue-500 text-white px-8 py-2 rounded-lg hover:bg-blue-600">
                Upload & Verify 🚀
            </button>
        </form>

    </div>

    <!-- RESULT -->
    {% if result %}
    <div class="mt-10 bg-white p-6 rounded-2xl shadow-md border max-w-3xl mx-auto">
        <h2 class="text-xl font-semibold mb-4">🔍 AI Result</h2>

        <p><strong>Labels:</strong> {{ result.labels }}</p>
        <p><strong>Confidence:</strong> {{ result.confidence }}</p>
    </div>
    {% endif %}

</div>

<!-- 🎥 CAMERA SCRIPT -->
<script>
let video = document.getElementById("video");

function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
            video.srcObject = stream;
        })
        .catch(err => {
            alert("Camera access denied!");
        });
}

function captureImage() {
    let canvas = document.getElementById("canvas");
    let context = canvas.getContext("2d");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    context.drawImage(video, 0, 0);

    let imageData = canvas.toDataURL("image/png");

    document.getElementById("image_data").value = imageData;

    // preview
    document.getElementById("preview").innerHTML =
        `<img src="${imageData}" class="rounded-xl mt-4"/>`;
}
</script>

{% endblock %}
